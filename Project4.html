<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 4 - Number Guessing Game</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: #212121;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #wrapper{
            background-color: #333;
            padding: 30px;
            border-radius: 12px;
            width: 450px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h1{
            margin-bottom: 20px;
            color: #ffd700;
        }

        p{
            margin: 10px 0;
            font-size: 16px;
        }

        .form{
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #guess{
            font-size: 18px;
            font-weight: bold;
        }

        #guessField{
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            text-align: center;
            outline: none;
        }

        button{
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #ffd700;
            color: black;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover{
            background-color: #ffbf00;
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <h1>Number Guessing Game</h1>

        <p>Try and guess a random number between 1 and 100!</p>
        <p>You have 10 attempts to guess the number!</p>

        <form class="form">
            <label for="guessField" id="guess">
                Enter your Guess:
            </label>

            <input
                type="number"
                id="guessField"
                min="1"
                max="100"
                placeholder="Enter number 1-100"
            >

            <button type="submit" id="submit">
                Submit Guess
            </button>
        </form>
        <div class="resultpara">
            <p> Previous Guess: <span class="guesses"></span></p>
            <p> Guess Remaining: <span class="LastResult">10</span></p>
            <p class="lowOrHi"></p>
        </div>
    </div>
</body>
<script>
    let random = parseInt(Math.random()*100 +1);
    const submit=document.querySelector('#submit')
    const user=document.querySelector('#guessField')
    const guesses=document.querySelector('.guesses')
    const remain=document.querySelector('.LastResult')
    const lowOrHi=document.querySelector('.lowOrHi')
    const start=document.querySelector('.resultpara')

    const p = document.createElement('p')

    let prevGuess=[]
    let  numGuess=1

    let playGame=true

    if(playGame){
        submit.addEventListener('click',function(e){
            e.preventDefault()
            const guess=parseInt(user.value)    
            validateGuess(guess)
        })
    }

    function validateGuess(guess){
        if(isNaN(guess)){
            alert('Please enter a valid number')
        }else if(guess<1){
            alert('Please enter a number greater than 0')
        }else if(guess>100){
            alert('Please enter a number less than 100')
        }
        else{
            prevGuess.push(guess)
            if(numGuess===11){
                displayGuess(guess)
                displayResult(`Game Over! The number was ${random}`)
                endGame()  
            }
            else{
                displayGuess(guess)
                checkGuess(guess)
            }
        }               
    }

    function checkGuess(guess){
        if(guess===random){
            displayResult(`Congratulations! You guessed the number ${random}`)
            endGame()
        }else if(guess<random){
            displayResult(`Your guess is too low!`)
        }else{
            displayResult(`Your guess is too high!`)
        }
    }

    function displayGuess(guess){
        user.value=''
        guesses.innerHTML+=`${guess} `
        numGuess++
        remain.textContent = 11 - numGuess;
    }

    function displayResult(message){
        lowOrHi.textContent = message;  
    }

    function endGame(){
        user.value=''
        user.setAttribute('disabled','')
        p.classList.add('button')
        p.innerHTML=`<button id="newGame">Start New Game</button>`
        start.appendChild(p);
        playGame=false;
        newGame();
    }

    function newGame(){
        document.querySelector('#newGame').addEventListener('click',function(e){
            random = parseInt(Math.random()*100 +1);
           prevGuess=[]
           numGuess=1
           guesses.textContent=''
           remain.textContent=11-numGuess
           user.removeAttribute('disabled')
            start.removeChild(p)
           lowOrHi.textContent=''
            playGame=true
        })  
    }
</script> 
</html>
