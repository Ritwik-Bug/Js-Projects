<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT 7</title>
    <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        color:white
    }
    html,body{
            height:100%;
            width:100%;
        }

        #cursor{
            height:20px;
            width:20px;
            background-color: red;
            border-radius:50%;
            position: absolute;
            mix-blend-mode: difference;
        }
        #main{
            height: 100%;
            width: 100%;
            background-color:black;
            display:flex;
            align-items: center;
            justify-content: center;
        }

        h1{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 10vw;
            font-weight: 900;

        }

    </style>
</head>
<body>
    <div id="main">
        <div id="cursor">
    </div>
    <h1>AHHHHH</h1>

    </div>
    
</body>
<script>
    const a=document.querySelector("#main")
    var c=document.querySelector("#cursor")
    
    a.addEventListener("mousemove",function(dets){
        c.style.left=dets.x+"px";
        c.style.top=dets.y+"px";
    })

</script>
</html>
